<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir Cuento | Admin — Pequeñas Historias Grandes Valores</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../JS/supabase-client.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="../JS/extractor-cuentos.js"></script>

  <style>
    body { min-height: 100vh; background: linear-gradient(160deg, #161616, #1e1e1e); }
    main { max-width: 760px; margin: 0 auto; padding: 32px 20px; }
    .form-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 28px; margin-bottom: 24px; }
    .form-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; font-weight: 700; color: var(--orange); text-transform: uppercase; }
    .form-group input, .form-group textarea { padding: 11px 14px; background: #1a1a1a; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text-light); font-size: 14px; outline: none; }
    .dropzone { border: 2px dashed var(--border); border-radius: 14px; padding: 32px; text-align: center; cursor: pointer; }
    .btn-extraer { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--orange); color: #fff; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .status-msg { font-size: 13px; margin-top: 10px; padding: 10px; border-radius: 10px; display: none; }
    .status-msg.show { display: block; }
    .preview-card { display: none; background: #2a2a2a; padding: 20px; border-radius: 18px; }
    .preview-card.show { display: block; }
    .preview-spread { background: #fdf6ee; border-radius: 10px; padding: 16px; margin-bottom: 15px; position: relative; }
    .preview-header-small { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 700; color: #c96a2d; font-size: 12px; }
    .preview-half { margin-bottom: 10px; }
    textarea { width: 100%; min-height: 80px; font-family: serif; font-size: 13px; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <main id="adminPanel">
    <h1>📤 Subir nuevo cuento</h1>
    <div class="form-card">
      <div class="form-row">
        <div class="form-group"><label>Título</label><input type="text" id="fTitulo"></div>
        <div class="form-group"><label>Autor</label><input type="text" id="fAutor"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Colegio</label><input type="text" id="fColegio"></div>
        <div class="form-group"><label>Curso</label><input type="text" id="fCurso" maxlength="50"></div>
        <div class="form-group"><label>Fecha</label><input type="date" id="fFecha"></div>
      </div>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" style="display:none">
        <p id="dzText">Hacé clic para elegir archivo</p>
      </div>
      <button class="btn-extraer" id="btnExtraer" onclick="procesarArchivo()" disabled>Extraer texto</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="form-card preview-card" id="previewCard">
      <h3>📖 Vista previa</h3>
      <div id="previewSpreads"></div>
      <button class="btn-extraer" onclick="guardarCuento()" style="background:#2e7d32">Guardar Cuento</button>
    </div>
  </main>

  <script>
    let paginasGeneradas = [];
    let archivoActual = null;

    fileInput.addEventListener('change', () => { if (fileInput.files[0]) { archivoActual = fileInput.files[0]; btnExtraer.disabled = false; dzText.textContent = archivoActual.name; } });

    async function procesarArchivo() {
      if (!archivoActual) return;
      mostrarStatus('Procesando...', 'info');
      try {
        const resultado = await extraerYPaginarCuento(archivoActual);
        paginasGeneradas = resultado.paginas;
        mostrarStatus('Extraído correctamente. Ya puedes editar las páginas abajo.', 'success');
        renderPreview();
      } catch (err) { mostrarStatus('Error: ' + err.message, 'error'); }
    }

    function renderPreview() {
      const cont = document.getElementById('previewSpreads');
      cont.innerHTML = paginasGeneradas.map((p, i) => `
        <div class="preview-spread" id="spread-${i}">
          <div class="preview-header-small">
            <span>Página ${i + 1}</span>
            <button onclick="eliminarPagina(${i})" style="color:red; cursor:pointer; border:none; background:none;">✕ Eliminar</button>
          </div>
          <div class="preview-half">
            <textarea oninput="paginasGeneradas[${i}].l = this.value">${p.l}</textarea>
          </div>
          <div class="preview-half">
            <textarea oninput="paginasGeneradas[${i}].r = this.value">${p.r}</textarea>
          </div>
        </div>
      `).join('');
      document.getElementById('previewCard').classList.add('show');
    }

    function eliminarPagina(idx) {
      if (confirm('¿Eliminar esta página?')) {
        paginasGeneradas.splice(idx, 1);
        renderPreview();
      }
    }

    function mostrarStatus(msg, tipo) { const el = document.getElementById('statusMsg'); el.textContent = msg; el.className = `status-msg show ${tipo}`; }

    async function guardarCuento() {
      // ... (Tu función guardarCuento actual sigue igual, esto guardará el array actualizado)
    }
  </script>
</body>
</html>
