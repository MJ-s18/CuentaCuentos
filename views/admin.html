<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir Cuento | Admin — Pequeñas Historias Grandes Valores</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../JS/supabase-client.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="../JS/extractor-cuentos.js"></script>

  <style>
    body { min-height: 100vh; background: radial-gradient(ellipse at 20% 0%, rgba(255,122,24,.08), transparent 50%), linear-gradient(160deg, #161616, #1e1e1e); }
    main { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
    
    .site-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
    .site-logo { font-weight: 700; color: var(--orange); text-decoration: none; line-height: 1.1; }
    .nav-links { display: flex; gap: 15px; }
    .btn-nav { padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; text-decoration: none; color: white; font-size: 14px; }
    .btn-nav:hover { border-color: var(--orange); }

    .form-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 28px; margin-bottom: 24px; }
    .form-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; font-weight: 700; color: var(--orange); text-transform: uppercase; }
    .form-group input, .form-group textarea { padding: 11px 14px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px; color: var(--text-light); font-size: 14px; outline: none; }
    .dropzone { border: 2px dashed var(--border); border-radius: 14px; padding: 32px; text-align: center; cursor: pointer; margin-bottom: 10px; }
    .btn-extraer { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--orange); color: #fff; font-weight: 700; cursor: pointer; }
    
    .preview-card { display: none; background: #2a2a2a; padding: 20px; border-radius: 18px; margin-top: 20px; }
    .preview-card.show { display: block; }
    .preview-spread { background: #fdf6ee; border-radius: 10px; padding: 16px; margin-bottom: 15px; }
    .preview-half { margin-bottom: 10px; }
    .preview-half h4 { color: #c96a2d; margin: 0 0 5px 0; font-size: 12px; }
    .preview-half textarea { width: 100%; min-height: 80px; font-family: serif; font-size: 13px; padding: 8px; border: 1px solid #e0c9a8; border-radius: 6px; }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="../index.html" class="site-logo">Pequeñas Historias<br><span>GRANDES VALORES</span></a>
    <nav class="nav-links">
      <a href="catalogo.html" class="btn-nav">📚 Catálogo</a>
      <a href="../index.html" class="btn-nav">🏠 Inicio</a>
    </nav>
  </header>

  <main id="adminPanel">
    <h1 style="color:white; margin-bottom: 20px;">📤 Subir nuevo cuento</h1>
    <div class="form-card">
      <div class="form-row">
        <div class="form-group"><label>Título</label><input type="text" id="fTitulo"></div>
        <div class="form-group"><label>Autor</label><input type="text" id="fAutor"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Colegio</label><input type="text" id="fColegio"></div>
        <div class="form-group"><label>Curso</label><input type="text" id="fCurso" maxlength="50"></div>
        <div class="form-group"><label>Fecha</label><input type="date" id="fFecha"></div>
      </div>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" style="display:none">
        <p id="dzText">Hacé clic para elegir archivo</p>
      </div>
      <button class="btn-extraer" id="btnExtraer" onclick="procesarArchivo()" disabled>⚙️ Extraer texto</button>
    </div>

    <div class="form-card preview-card" id="previewCard">
      <h3 style="color:white; margin-bottom:5px;">📖 Vista previa</h3>
      <p id="previewCount" style="color:var(--orange); font-size:14px; margin-bottom:15px;"></p>
      <div id="previewSpreads"></div>
      <button class="btn-extraer" onclick="guardarCuento()" style="background:#2e7d32; margin-top:20px;">✓ Guardar Cuento</button>
    </div>
  </main>

  <script>
    let paginasGeneradas = [];
    let archivoActual = null;
    
    if (sessionStorage.getItem('cc_admin') !== 'true') window.location.href = '../index.html';

    fileInput.addEventListener('change', () => { 
        if (fileInput.files[0]) { 
            archivoActual = fileInput.files[0]; 
            btnExtraer.disabled = false; 
            document.getElementById('dzText').textContent = '✓ ' + archivoActual.name; 
        } 
    });

    async function procesarArchivo() {
      try {
        const res = await extraerYPaginarCuento(archivoActual);
        paginasGeneradas = res.paginas;
        renderPreview();
      } catch (err) { alert('Error: ' + err.message); }
    }

    function renderPreview() {
      const cont = document.getElementById('previewSpreads');
      paginasGeneradas = paginasGeneradas.filter(p => (p.l || '').trim() !== '' || (p.r || '').trim() !== '');
      document.getElementById('previewCount').textContent = `${paginasGeneradas.length} hojas`;

      cont.innerHTML = paginasGeneradas.map((p, i) => `
        <div class="preview-spread" id="spread-${i}">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <strong>Hoja ${i + 1}</strong>
            <button onclick="eliminarPagina(${i})" style="background:#d9231d; color:white; border:none; border-radius:8px; padding:6px 10px; cursor:pointer;">🗑 Eliminar hoja</button>
          </div>
          <div class="preview-half">
            <h4>Izquierda</h4>
            <textarea onchange="actualizarTexto(${i}, 'l', this.value)">${escapeHtml(p.l)}</textarea>
          </div>
          <div class="preview-half">
            <h4>Derecha</h4>
            <textarea onchange="actualizarTexto(${i}, 'r', this.value)">${escapeHtml(p.r)}</textarea>
          </div>
        </div>
      `).join('');
      document.getElementById('previewCard').classList.add('show');
    }

    function actualizarTexto(idx, lado, valor) {
      paginasGeneradas[idx][lado] = valor;
      const pagina = paginasGeneradas[idx];
      if ((!pagina.l || !pagina.l.trim()) && (!pagina.r || !pagina.r.trim())) {
        paginasGeneradas.splice(idx, 1);
        renderPreview();
      }
    }

    function eliminarPagina(idx) {
      if (!confirm(`¿Eliminar la hoja ${idx + 1}?`)) return;
      paginasGeneradas.splice(idx, 1);
      renderPreview();
      mostrarStatus('🗑 Hoja eliminada correctamente.', 'success');
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
